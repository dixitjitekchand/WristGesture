plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wrist.gesture'
    compileSdk 34

    defaultConfig {
        applicationId "com.wrist.gesture"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
